<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Level Oyun</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    overflow: hidden;
  }

  #box {
    width: 100px;
    height: 100px;
    background: red;
    margin: 100px auto;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.15s;
    position: absolute;
  }

  #hud {
    font-size: 22px;
    margin-top: 20px;
  }

  #levelUp {
    font-size: 30px;
    color: gold;
    margin-top: 10px;
    height: 40px;
  }
</style>
</head>
<body>

<h1>🎮 Tıkla ve Level Atla</h1>

<div id="hud">
  Puan: <span id="score">0</span> |
  Level: <span id="level">1</span>
</div>

<div id="levelUp"></div>
<div id="box"></div>

<script>
let score = 0;
let level = 1;

const box = document.getElementById("box");
const scoreText = document.getElementById("score");
const levelText = document.getElementById("level");
const levelUpText = document.getElementById("levelUp");

// kutuyu random konuma taşı
function moveBox() {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 120);
    box.style.left = x + "px";
    box.style.top = y + "px";
}

// başlangıç pozisyonu
moveBox();

// tıklama olayı
box.addEventListener("click", () => {
    score++;
    scoreText.innerText = score;

    // renk değiştir
    box.style.background = "#" + Math.floor(Math.random()*16777215).toString(16);

    // kutu hareket etsin
    moveBox();

    // level sistemi (her 10 puanda level artar)
    if (score % 10 === 0) {
        level++;
        levelText.innerText = level;

        levelUpText.innerText = "🔥 LEVEL UP! 🔥";

        setTimeout(() => {
            levelUpText.innerText = "";
        }, 1500);
    }

    // 100 puan tebrik sistemi
    if (score % 100 === 0) {
        alert("🎉 Tebrikler! " + score + " puana ulaştın!");
    }
});
</script>

</body>
</html>
